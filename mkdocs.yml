site_name: Cendry
site_description: A Firestore ODM for Python
site_url: https://johnnoone.github.io/cendry/

repo_url: https://github.com/johnnoone/cendry
repo_name: johnnoone/cendry

exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/fire.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true

nav:
  - Home: index.md
  - Tutorials:
    - tutorials/index.md
    - First Steps: tutorials/first-steps.md
    - Querying Data: tutorials/querying.md
    - Writing Data: tutorials/writing.md
    - Async: tutorials/async.md
  - How-To Guides:
    - how-to/index.md
    - Define Models: how-to/models.md
    - Write, Update, Delete: how-to/writing.md
    - Auto-Timestamps: how-to/auto-timestamps.md
    - Batch and Transactions: how-to/batch-and-transactions.md
    - Filter and Query: how-to/filtering.md
    - Use Aliases: how-to/aliases.md
    - Serialize Data: how-to/serialization.md
    - Extend Type Validation: how-to/type-validation.md
    - Use Async: how-to/async.md
    - Test with Emulator: how-to/testing.md
    - Migrate Datastore to Native: how-to/migrate-datastore-to-native.md
  - Reference:
    - reference/index.md
    - Models: reference/models.md
    - Context: reference/context.md
    - Query: reference/query.md
    - Filters: reference/filters.md
    - Serialization: reference/serialization.md
    - Types: reference/types.md
    - Exceptions: reference/exceptions.md
  - Explanation:
    - explanation/index.md
    - What is Firestore?: explanation/firestore.md
    - Comparisons: explanation/comparison.md
    - Architecture: explanation/architecture.md
    - Design Decisions: explanation/design-decisions.md
